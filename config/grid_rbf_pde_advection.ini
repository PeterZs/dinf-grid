[DEFAULT]
expt_name = grid_rbf_pde_advection

[EXPT]
n_coord_dims = 2
coord_space = [2, 2]
n_signal_dims = 1
target_type = advection
loss_type = pde
boundary_condition = advection_boundary

[MODULE]
module_type = feature_grid
interpolation_type = rbf
grid_resolution = 64
scales = 1
feature_dim = 1
feature_decoder_type = linear

[TRAIN]
n_train_stratified_samples_per_dim = 256
sampling_strategy = stratified
lrate = 1e-2
decay_lrate = True
lrate_decay_steps = 5000
lrate_decay_rate = 0.1
n_iterations = 5001

[TEST]
n_test_samples_per_dim = 256
