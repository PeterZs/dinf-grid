[DEFAULT]
expt_name = siren_signal_sdf

[EXPT]
n_coord_dims = 3
n_signal_dims = 1
target_type = sdf
loss_type = signal

[MODULE]
module_type = siren

[TRAIN]
n_train_stratified_samples_per_dim = 32
n_train_data_samples_per_dim = 56
sampling_strategy = data_and_stratified
lrate = 1e-4
decay_lrate = False
lrate_decay_steps = 5000
lrate_decay_rate = 0.1
n_iterations = 20001

[TEST]
n_test_samples_per_dim = 128
i_test = 200

point_cloud_path = assets/bun_zipper.ply