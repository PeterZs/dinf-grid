[DEFAULT]
expt_name = siren_laplacian_image

[EXPT]
n_coord_dims = 2
n_signal_dims = 3
target_type = image
loss_type = laplacian

[MODULE]
module_type = siren
hidden_layers = 3
hidden_features = 128

[TRAIN]
n_train_data_samples_per_dim = 256
sampling_strategy = data
lrate = 5e-5
decay_lrate = False
lrate_decay_steps = 5000
lrate_decay_rate = 0.1
n_iterations = 20001

[TEST]
image_path = assets/vancouver_512.jpg