[DEFAULT]
expt_name = grid_rbf_laplacian_image

[EXPT]
n_coord_dims = 2
n_signal_dims = 3
target_type = image
loss_type = laplacian

[MODULE]
module_type = feature_grid
interpolation_type = rbf
feature_dim = 3
grid_resolution = 512
scales = 4
feature_decoder_type = linear

[TRAIN]
n_train_data_samples_per_dim = 256
sampling_strategy = data
lrate = 5e-3
decay_lrate = True
lrate_decay_steps = 5000
lrate_decay_rate = 0.1
n_iterations = 10001

[TEST]
image_path = assets/vancouver_512.jpg