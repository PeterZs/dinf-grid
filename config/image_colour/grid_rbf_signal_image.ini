[DEFAULT]
expt_name = grid_rbf_signal_image

[EXPT]
n_coord_dims = 2
n_signal_dims = 3
target_type = image
loss_type = signal

[MODULE]
module_type = feature_grid
interpolation_type = rbf
feature_dim = 3
grid_resolution = 1024
neighborhood_ring_size = 2
scales = 1

[TRAIN]
n_train_data_samples_per_dim = 256
sampling_strategy = data
lrate = 5e-3
decay_lrate = True
lrate_decay_steps = 5000
lrate_decay_rate = 0.1
n_iterations = 10001

[TEST]
image_path = assets/tokyo_5120.jpg
use_patch = True