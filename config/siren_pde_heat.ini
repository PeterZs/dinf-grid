[DEFAULT]
expt_name = siren_pde_heat

[EXPT]
n_coord_dims = 2
coord_space = [1, 1]
n_signal_dims = 1
target_type = heat
loss_type = pde
boundary_condition = heat_boundary

[MODULE]
module_type = siren
hidden_features = 256
hidden_layers = 3

[TRAIN]
n_train_stratified_samples_per_dim = 256
sampling_strategy = stratified
lrate = 1e-5
decay_lrate = True
lrate_decay_steps = 5000
lrate_decay_rate = 0.1
n_iterations = 5001

[TEST]
n_test_samples_per_dim = 256
