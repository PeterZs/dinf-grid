[DEFAULT]
expt_name = siren_pde_helmholtz

[EXPT]
n_coord_dims = 2
n_signal_dims = 2
target_type = helmholtz
loss_type = pde

[MODULE]
module_type = siren
hidden_features = 512
hidden_layers = 4

[TRAIN]
n_train_stratified_samples_per_dim = 256
sampling_strategy = stratified
lrate = 2e-5
decay_lrate = False
lrate_decay_steps = 5000
lrate_decay_rate = 0.1
n_iterations = 10001

[TEST]
n_test_samples_per_dim = 256