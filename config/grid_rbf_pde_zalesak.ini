[DEFAULT]
expt_name = grid_rbf_pde_zalesak

[EXPT]
n_coord_dims = 3
coord_space = [1, 1, 1]  ; [t, x, y], domain is [-1,1]x[-1,1]
n_signal_dims = 1
target_type = zalesak
loss_type = pde
boundary_condition = zalesak_boundary
zalesak_radius = 0.3
zalesak_slot_width = 0.1
zalesak_slot_height = 0.5
zalesak_center_x = 0.0
zalesak_center_y = 0.5

[MODULE]
module_type = feature_grid
interpolation_type = rbf
grid_resolution = 64
scales = 3
feature_dim = 1
feature_decoder_type = linear

[TRAIN]
n_train_stratified_samples_per_dim = 64
sampling_strategy = stratified
lrate = 5e-3
decay_lrate = True
lrate_decay_steps = 5000
lrate_decay_rate = 0.1
n_iterations = 10001

[TEST]
n_test_samples_per_dim = 64
