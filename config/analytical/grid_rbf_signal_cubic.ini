[DEFAULT]
expt_name = grid_rbf_signal_cubic

[EXPT]
n_coord_dims = 1
target_type = cubic
loss_type = signal

[MODULE]
module_type = feature_grid
interpolation_type = rbf
feature_dim = 1
grid_resolution = 64
scale = 2

[TRAIN]
n_train_stratified_samples_per_dim = 256
sampling_strategy = stratified
lrate = 1e-2
decay_lrate = True
lrate_decay_steps = 3000
lrate_decay_rate = 0.1
n_iterations = 5001

[TEST]
n_test_samples_per_dim = 256
