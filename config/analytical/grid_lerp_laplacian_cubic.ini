[DEFAULT]
expt_name = grid_lerp_laplacian_cubic

[EXPT]
n_coord_dims = 1
target_type = cubic
loss_type = laplacian

[MODULE]
module_type = feature_grid
interpolation_type = lerp
feature_dim = 1
grid_resolution = 32

[TRAIN]
n_train_stratified_samples_per_dim = 256
lrate = 1e-3
decay_lrate = True
lrate_decay_steps = 5000
lrate_decay_rate = 0.1
n_iterations = 5001

[TEST]
n_test_samples_per_dim = 256
