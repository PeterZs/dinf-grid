[DEFAULT]
expt_name = siren_pde_neuralclothsim

[EXPT]
n_coord_dims = 2
n_signal_dims = 3
target_type = neuralclothsim
loss_type = pde
boundary_condition = neuralclothsim_top_left_top_right_moved

[MODULE]
module_type = siren
hidden_features = 512
hidden_layers = 5

[TRAIN]
n_train_stratified_samples_per_dim = 64
sampling_strategy = stratified
lrate = 5e-6
decay_lrate = True
lrate_decay_steps = 2000
lrate_decay_rate = 0.1
n_iterations = 50001

[TEST]
n_test_samples_per_dim = 64