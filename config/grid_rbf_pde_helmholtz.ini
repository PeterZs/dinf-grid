[DEFAULT]
expt_name = grid_rbf_pde_helmholtz

[EXPT]
n_coord_dims = 2
n_signal_dims = 2
target_type = helmholtz
loss_type = pde

[MODULE]
module_type = feature_grid
interpolation_type = rbf
feature_dim = 2
grid_resolution = 128
neighborhood_ring_size = 3
scales = 4
feature_decoder_type = mlp

[TRAIN]
n_train_stratified_samples_per_dim = 256
sampling_strategy = stratified
lrate = 1e-3
decay_lrate = False
lrate_decay_steps = 5000
lrate_decay_rate = 0.1
n_iterations = 10001

[TEST]
n_test_samples_per_dim = 256