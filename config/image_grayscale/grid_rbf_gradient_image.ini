[DEFAULT]
expt_name = grid_rbf_gradient_image

[EXPT]
n_coord_dims = 2
target_type = image
loss_type = gradient

[MODULE]
module_type = feature_grid
interpolation_type = rbf
feature_dim = 2
grid_resolution = 512
scales = 6

[TRAIN]
n_train_data_samples_per_dim = 512
sampling_strategy = data
lrate = 5e-3
decay_lrate = True
lrate_decay_steps = 5000
lrate_decay_rate = 0.1
n_iterations = 10001

[TEST]