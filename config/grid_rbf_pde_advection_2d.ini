[DEFAULT]
expt_name = grid_rbf_pde_advection_2d

[EXPT]
n_coord_dims = 3
coord_space = [2, 1, 1]
n_signal_dims = 1
target_type = advection
loss_type = pde
boundary_condition = advection_boundary
advection_mu = [-0.6, -0.6]
advection_sigma = 0.1
advection_velocity = [0.25, 0.25]

[MODULE]
module_type = feature_grid
interpolation_type = rbf
grid_resolution = 64
scales = 3
feature_dim = 1
feature_decoder_type = linear

[TRAIN]
n_train_stratified_samples_per_dim = 64
sampling_strategy = stratified
lrate = 1e-3
decay_lrate = True
lrate_decay_steps = 5000
lrate_decay_rate = 0.1
n_iterations = 10001

[TEST]
n_test_samples_per_dim = 64
